<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img">
<title>Multitier Architecture concept diagram</title>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#6a5b95"/>
  </marker>
</defs>
<rect width="900" height="520" fill="#f6f8f5"/>
<rect x="32" y="32" width="836" height="456" rx="12" fill="#ffffff" stroke="#d8dfd5"/>
<rect x="32" y="32" width="836" height="84" rx="12" fill="#6a5b95" opacity="0.12"/>
<text x="64" y="78" font-size="34" font-weight="800" fill="#17212b"><tspan x="64" dy="0">Multitier Architecture</tspan></text>
<text x="64" y="144" font-size="20" font-weight="500" fill="#42515c"><tspan x="64" dy="0">Multitier architecture separates an application into layers such as</tspan><tspan x="64" dy="27">presentation, business logic, and data storage.</tspan></text>
<line x1="280" y1="308" x2="360" y2="308" stroke="#6a5b95" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="540" y1="308" x2="620" y2="308" stroke="#6a5b95" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="64" y="250" width="220" height="116" rx="8" fill="#ffffff" stroke="#6a5b95" stroke-width="3"/>
<circle cx="98" cy="288" r="17" fill="#6a5b95" opacity="0.16"/>
<circle cx="98" cy="288" r="8" fill="#6a5b95"/>
<text x="88" y="334" font-size="22" font-weight="700" fill="#1b2733"><tspan x="88" dy="0">Presentation</tspan><tspan x="88" dy="29">tier</tspan></text>


<rect x="340" y="250" width="220" height="116" rx="8" fill="#ffffff" stroke="#6a5b95" stroke-width="3"/>
<circle cx="374" cy="288" r="17" fill="#6a5b95" opacity="0.16"/>
<circle cx="374" cy="288" r="8" fill="#6a5b95"/>
<text x="364" y="334" font-size="22" font-weight="700" fill="#1b2733"><tspan x="364" dy="0">Application</tspan><tspan x="364" dy="29">logic</tspan></text>


<rect x="616" y="250" width="220" height="116" rx="8" fill="#ffffff" stroke="#6a5b95" stroke-width="3"/>
<circle cx="650" cy="288" r="17" fill="#6a5b95" opacity="0.16"/>
<circle cx="650" cy="288" r="8" fill="#6a5b95"/>
<text x="640" y="334" font-size="22" font-weight="700" fill="#1b2733"><tspan x="640" dy="0">Data storage</tspan></text>

<rect x="64" y="406" width="772" height="42" rx="8" fill="#eef3ed"/>
<text x="86" y="434" font-size="20" font-weight="700" fill="#22303a"><tspan x="86" dy="0">Key idea: Separates presentation, logic, and data responsibilities.</tspan></text>
</svg>
